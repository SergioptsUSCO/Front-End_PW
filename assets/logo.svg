<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1DB954" />
      <stop offset="50%" stop-color="#1ed760" />
      <stop offset="100%" stop-color="#1fdf64" />
    </linearGradient>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.7" />
    </linearGradient>
  </defs>
  
  <!-- Main circle -->
  <circle cx="50" cy="50" r="48" fill="url(#logoGradient)" />
  
  <!-- Sound wave bars - creating a modern audio visualization effect -->
  <g fill="url(#waveGradient)">
    <!-- Bar 1 - shortest -->
    <rect x="20" y="42" width="6" height="16" rx="3" />
    
    <!-- Bar 2 - medium -->
    <rect x="30" y="35" width="6" height="30" rx="3" />
    
    <!-- Bar 3 - tallest -->
    <rect x="40" y="25" width="6" height="50" rx="3" />
    
    <!-- Bar 4 - medium-tall -->
    <rect x="50" y="30" width="6" height="40" rx="3" />
    
    <!-- Bar 5 - medium -->
    <rect x="60" y="35" width="6" height="30" rx="3" />
    
    <!-- Bar 6 - tallest -->
    <rect x="70" y="20" width="6" height="60" rx="3" />
  </g>
  
  <!-- Play button accent in the center -->
  <circle cx="50" cy="50" r="12" fill="rgba(255,255,255,0.2)" />
  <path d="M 47 44 L 47 56 L 57 50 Z" fill="white" />
</svg>
